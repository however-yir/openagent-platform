apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forgepilot.fullname" . }}
  labels:
    {{- include "forgepilot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "forgepilot.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "forgepilot.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: forgepilot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "forgepilot.fullname" . }}-config
            - secretRef:
                name: {{ include "forgepilot.fullname" . }}-secret
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
