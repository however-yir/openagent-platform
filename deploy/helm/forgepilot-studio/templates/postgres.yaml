{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "forgepilot.fullname" . }}-postgres
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.postgres.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forgepilot.fullname" . }}-postgres
  labels:
    {{- include "forgepilot.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "forgepilot.fullname" . }}-postgres
  template:
    metadata:
      labels:
        app: {{ include "forgepilot.fullname" . }}-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.app.env.DB_NAME | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.app.env.DB_USER | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "forgepilot.fullname" . }}-secret
                  key: DB_PASS
          ports:
            - containerPort: 5432
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: {{ include "forgepilot.fullname" . }}-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "forgepilot.fullname" . }}-postgres
spec:
  selector:
    app: {{ include "forgepilot.fullname" . }}-postgres
  ports:
    - port: 5432
      targetPort: 5432
{{- end }}
